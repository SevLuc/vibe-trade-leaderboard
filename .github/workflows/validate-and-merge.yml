name: validate-and-merge
# SECURITY: pull_request_target runs with THIS repo's permissions against fork
# PRs. We NEVER check out or execute the PR's code — we read exactly ONE JSON
# data file from the PR head via the API, and validate it with this repo's OWN
# vendored validator (scripts/validate_score.py, fetched from trusted upstream
# main via the API — never from the PR head). No engine install, no secret.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
permissions:
  contents: write
  pull-requests: write
  actions: write
jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      AUTHOR: ${{ github.event.pull_request.user.login }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      UPSTREAM: ${{ github.repository }}
    steps:
      - name: Guard — PR must change exactly scores/<author>.json
        run: |
          files=$(gh api "repos/${UPSTREAM}/pulls/${PR}/files" -q '.[].filename')
          if [ "$files" != "scores/${AUTHOR}.json" ]; then
            gh pr comment "$PR" -R "$UPSTREAM" -b "Not auto-merged: a score PR must change exactly one file, \`scores/${AUTHOR}.json\` (this PR changed: ${files:-nothing}). A human will take a look."
            exit 1
          fi
      - name: Fetch the score file from the PR head (data only, never code)
        run: |
          gh api "repos/${HEAD_REPO}/contents/scores/${AUTHOR}.json?ref=${HEAD_SHA}" -q .content | base64 -d > /tmp/score.json
      - name: Validate with this repo's own vendored validator
        run: |
          # Fetch the validator from trusted UPSTREAM main (this repo) — never
          # from the PR head. Pure stdlib, no engine install, no secret.
          gh api "repos/${UPSTREAM}/contents/scripts/validate_score.py?ref=main" -q .content | base64 -d > /tmp/validate_score.py
          if ! python3 /tmp/validate_score.py validate /tmp/score.json; then
            gh pr comment "$PR" -R "$UPSTREAM" -b "Not auto-merged: the score file failed validation (percentages and dates only — never balances). A human will take a look."
            exit 1
          fi
      - name: Merge
        run: gh pr merge "$PR" -R "$UPSTREAM" --squash
      - name: Trigger the README/chart render
        # A github.token merge does NOT fire render.yml's push trigger, so
        # dispatch it explicitly (needs actions: write).
        run: gh workflow run render.yml --repo "$UPSTREAM"
