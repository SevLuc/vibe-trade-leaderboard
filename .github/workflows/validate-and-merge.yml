name: validate-and-merge
# SECURITY: pull_request_target runs with THIS repo's permissions against fork
# PRs. We NEVER check out or execute the PR's code — we read exactly ONE JSON
# data file from the PR head via the API, and validate it with this repo's OWN
# vendored validator (scripts/validate_score.py, fetched from trusted upstream
# main via the API — never from the PR head). No engine install, no secret.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
permissions:
  contents: write
  pull-requests: write
  actions: write
jobs:
  guard:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR: ${{ github.event.pull_request.number }}
      AUTHOR: ${{ github.event.pull_request.user.login }}
      HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      UPSTREAM: ${{ github.repository }}
    steps:
      - name: Guard — PR may change only scores/<author>[_<account>].json file(s)
        run: |
          files=$(gh api "repos/${UPSTREAM}/pulls/${PR}/files" -q '.[].filename')
          if [ -z "$files" ]; then
            gh pr comment "$PR" -R "$UPSTREAM" -b "Not auto-merged: this PR changed no files. A human will take a look."
            exit 1
          fi
          # Every changed file must be THIS author's own score file: either
          # scores/<author>.json or scores/<author>_<account>.json (account is
          # alphanumeric — e.g. paper, live). A GitHub login can never contain
          # '_', so the underscore unambiguously separates login from account:
          # no other user's namespace can match this author's pattern.
          while IFS= read -r f; do
            if ! printf '%s' "$f" | grep -Eq "^scores/${AUTHOR}(_[A-Za-z0-9]+)?\.json$"; then
              gh pr comment "$PR" -R "$UPSTREAM" -b "Not auto-merged: a score PR may change only \`scores/${AUTHOR}.json\` or \`scores/${AUTHOR}_<account>.json\` (this PR changed: $(printf '%s' "$files" | paste -sd, -)). A human will take a look."
              exit 1
            fi
          done <<< "$files"
      - name: Fetch + validate each score file (data only, never code)
        run: |
          # Validator comes from trusted UPSTREAM main (this repo) — never from
          # the PR head. Pure stdlib, no engine install, no secret.
          gh api "repos/${UPSTREAM}/contents/scripts/validate_score.py?ref=main" -q .content | base64 -d > /tmp/validate_score.py
          files=$(gh api "repos/${UPSTREAM}/pulls/${PR}/files" -q '.[].filename')
          while IFS= read -r f; do
            gh api "repos/${HEAD_REPO}/contents/${f}?ref=${HEAD_SHA}" -q .content | base64 -d > /tmp/score.json
            # The github field must be the PR author — no claiming someone else's
            # row via a look-alike filename.
            login=$(python3 -c 'import json; print(json.load(open("/tmp/score.json")).get("github",""))')
            if [ "$login" != "$AUTHOR" ]; then
              gh pr comment "$PR" -R "$UPSTREAM" -b "Not auto-merged: the \`github\` field in \`${f}\` must be \`${AUTHOR}\`. A human will take a look."
              exit 1
            fi
            if ! python3 /tmp/validate_score.py validate /tmp/score.json; then
              gh pr comment "$PR" -R "$UPSTREAM" -b "Not auto-merged: \`${f}\` failed validation (percentages and dates only — never balances). A human will take a look."
              exit 1
            fi
          done <<< "$files"
      - name: Merge
        run: gh pr merge "$PR" -R "$UPSTREAM" --squash
      - name: Trigger the README/chart render
        # A github.token merge does NOT fire render.yml's push trigger, so
        # dispatch it explicitly (needs actions: write).
        run: gh workflow run render.yml --repo "$UPSTREAM"
