name: sync-scores
# Self-healing fallback for the daily score pipeline.
#
# THE NORMAL PATH: an external routine pushes scores/<author>.json to the
# `score-update` branch and OPENS a pull request; that PR triggers
# validate-and-merge.yml, which merges to main and dispatches the render.
#
# THE FAILURE THIS FIXES: the whole chain hinges on a PR being *opened* each
# day. That step lives outside this repo and has failed before (see PR #3:
# "cloud routine's ensure_pr step had no gh CLI"; and the 2026-07 cloud env
# where ensure_pr is egress/proxy-blocked). When a score lands on the
# `score-update` branch but no PR is opened, GitHub fires nothing, the score
# never reaches main, render never runs, and the leaderboard freezes.
#
# WHAT THIS DOES: on every push to `score-update` (and on a schedule + on
# demand as a backstop), it picks up any score sitting on `score-update` that
# never made it into main, validates it with THIS repo's own vendored
# validator, applies it to main, re-renders, and pushes. It reads ONLY the
# scores/*.json data files from the branch — it never checks out or executes
# score-branch code. It is idempotent: when score-update == main it does
# nothing, so it composes harmlessly with the normal PR path.
#
# NOTE: GitHub reads a push-triggered workflow from the PUSHED branch, so this
# file must carry the push trigger on score-update itself (not only on main).
# The routine pushes score-update with a PAT (PAT pushes DO fire workflow
# events); this job pushes to MAIN with the built-in GITHUB_TOKEN, whose pushes
# do NOT trigger workflows — so no loop.
on:
  push:
    branches: [score-update]   # fire instantly when a routine pushes a score
  schedule:
    - cron: "0 */6 * * *"   # backstop — catches a push if the trigger is missed
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply any new scores from score-update (data only, never code)
        run: |
          set -euo pipefail
          git fetch origin score-update || { echo "no score-update branch — nothing to sync"; exit 0; }
          # Files that were on the branch when it last diverged from main. A file
          # present here but absent from main was intentionally removed/renamed on
          # main (e.g. SevLuc.json -> SevLuc_paper.json) — we must NOT resurrect
          # it. A file NOT here is a genuinely new account the branch introduced.
          base=$(git merge-base main origin/score-update)
          applied=0
          while read -r f; do
            [ -z "$f" ] && continue
            case "$f" in scores/*.json) ;; *) continue ;; esac
            # Skip files deleted on the branch — we only ever pull data forward.
            git cat-file -e "origin/score-update:$f" 2>/dev/null || continue
            git show "origin/score-update:$f" > /tmp/candidate.json
            if ! python3 scripts/validate_score.py validate /tmp/candidate.json; then
              echo "::warning::$f failed validation on score-update; skipping"
              continue
            fi
            if [ -f "$f" ]; then
              # Existing account: regression guard — never move a score backwards.
              # YYYY-MM-DD compares lexicographically, so a plain >= is correct.
              ok=$(python3 -c 'import json,sys; print("1" if json.load(open(sys.argv[2]))["as_of"] >= json.load(open(sys.argv[1]))["as_of"] else "0")' "$f" /tmp/candidate.json)
              [ "$ok" = "1" ] || { echo "::notice::$f on score-update is older than main; skipping"; continue; }
            elif git cat-file -e "$base:$f" 2>/dev/null; then
              # Not on main, but existed at the divergence point => removed/renamed
              # on main on purpose. Do not bring it back.
              echo "::notice::$f was removed/renamed on main; not resurrecting"
              continue
            fi
            cp /tmp/candidate.json "$f"
            git add "$f"
            applied=1
          done < <(git diff --name-only main origin/score-update -- scores)
          echo "applied=$applied" >> "$GITHUB_ENV"
      - name: Render and push if a score was applied
        if: env.applied == '1'
        run: |
          set -euo pipefail
          python3 scripts/render_readme.py
          git config user.name "leaderboard-bot"
          git config user.email "leaderboard-bot@users.noreply.github.com"
          git add scores README.md chart.svg sparklines
          git diff --cached --quiet || { git commit -m "sync + render leaderboard"; git push; }
