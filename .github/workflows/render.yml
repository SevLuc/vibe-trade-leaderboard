name: render-leaderboard
on:
  push:
    branches: [main]
    paths: ["scores/**"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render README from scores
        run: python3 scripts/render_readme.py
      - name: Commit the rendered table
        run: |
          git config user.name "leaderboard-bot"
          git config user.email "leaderboard-bot@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || { git commit -m "render leaderboard"; git push; }
